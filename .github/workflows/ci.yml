name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      # The gui package embeds frontend/dist, which is built by Wails and not
      # present in CI. Target the CLI and library packages directly so the gui
      # embed is never evaluated (and vscode/node_modules is excluded too).
      - name: Build
        run: go build ./cmd/... ./internal/...

      - name: Test
        run: go test ./cmd/... ./internal/...
