name: Schema Diff

on:
  pull_request:
    paths:
      - "**.db"
      - "**migrations**"
      - "**schema**"
      - "**.sql"

permissions:
  contents: read
  pull-requests: write

jobs:
  schema-diff:
    name: Comment schema diff on PR
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history to compare base branch

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install litescope
        run: go install github.com/croc100/litescope/cmd/litescope@latest

      # ── Find changed .db files ─────────────────────────────────────────────
      - name: Detect changed DB files
        id: changed
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.db' | head -5)
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "Found DB files: $FILES"

      # ── Run diff for each changed file ─────────────────────────────────────
      - name: Run schema diff
        id: diff
        if: steps.changed.outputs.files != ''
        run: |
          REPORT=""
          for FILE in ${{ steps.changed.outputs.files }}; do
            if git show origin/${{ github.base_ref }}:"$FILE" > /tmp/base.db 2>/dev/null; then
              DIFF=$(litescope diff /tmp/base.db "$FILE" --format markdown 2>&1 || true)
              REPORT="${REPORT}

          ### \`${FILE}\`

          ${DIFF}"
            fi
          done
          # write to file to avoid shell escaping issues
          echo "$REPORT" > /tmp/diff-report.md
          echo "has_diff=$([[ -s /tmp/diff-report.md ]] && echo true || echo false)" >> $GITHUB_OUTPUT

      # ── Post comment ───────────────────────────────────────────────────────
      - name: Post diff comment
        if: steps.changed.outputs.files != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/diff-report.md', 'utf8');

            const body = [
              '## Schema Diff',
              '',
              report.trim() || '_No schema changes detected._',
              '',
              '---',
              '<sub>Generated by [Litescope](https://litescope.dev) · [validate migrations](https://litescope.dev/docs/validate) to block unexpected changes</sub>',
            ].join('\n');

            // Find existing bot comment and update, or create new
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.startsWith('## Schema Diff')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
